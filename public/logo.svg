<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1a30"/>
      <stop offset="100%" stop-color="#0e4a6e"/>
    </linearGradient>
    <linearGradient id="rayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)"/>

  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="80" stroke="#22d3ee" stroke-width="1.5" opacity="0.18"/>
  <circle cx="100" cy="100" r="68" stroke="#22d3ee" stroke-width="1" opacity="0.12"/>

  <!-- ── 8 Cardinal Rays ── -->
  <!-- Top -->
  <rect x="97.5" y="32" width="5" height="38" rx="2.5" fill="url(#rayGrad)"/>
  <rect x="88"   y="22" width="24" height="10" rx="3" fill="url(#rayGrad)"/>
  <circle cx="100" cy="20" r="4" fill="#67e8f9" opacity="0.7"/>

  <!-- Bottom -->
  <rect x="97.5" y="130" width="5" height="38" rx="2.5" fill="url(#rayGrad)"/>
  <rect x="88"   y="168" width="24" height="10" rx="3" fill="url(#rayGrad)"/>
  <circle cx="100" cy="180" r="4" fill="#67e8f9" opacity="0.7"/>

  <!-- Left -->
  <rect x="32"  y="97.5" width="38" height="5" rx="2.5" fill="url(#rayGrad)"/>
  <rect x="22"  y="88"   width="10" height="24" rx="3" fill="url(#rayGrad)"/>
  <circle cx="20" cy="100" r="4" fill="#67e8f9" opacity="0.7"/>

  <!-- Right -->
  <rect x="130" y="97.5" width="38" height="5" rx="2.5" fill="url(#rayGrad)"/>
  <rect x="168" y="88"   width="10" height="24" rx="3" fill="url(#rayGrad)"/>
  <circle cx="180" cy="100" r="4" fill="#67e8f9" opacity="0.7"/>

  <!-- Top-Right diagonal -->
  <line x1="118" y1="82" x2="148" y2="52" stroke="url(#rayGrad)" stroke-width="5" stroke-linecap="round"/>
  <rect x="144" y="40" width="16" height="16" rx="3" fill="url(#rayGrad)" transform="rotate(45 152 48)"/>

  <!-- Bottom-Right diagonal -->
  <line x1="118" y1="118" x2="148" y2="148" stroke="url(#rayGrad)" stroke-width="5" stroke-linecap="round"/>
  <rect x="144" y="144" width="16" height="16" rx="3" fill="url(#rayGrad)" transform="rotate(45 152 152)"/>

  <!-- Bottom-Left diagonal -->
  <line x1="82" y1="118" x2="52" y2="148" stroke="url(#rayGrad)" stroke-width="5" stroke-linecap="round"/>
  <rect x="40" y="144" width="16" height="16" rx="3" fill="url(#rayGrad)" transform="rotate(45 48 152)"/>

  <!-- Top-Left diagonal -->
  <line x1="82" y1="82" x2="52" y2="52" stroke="url(#rayGrad)" stroke-width="5" stroke-linecap="round"/>
  <rect x="40" y="40" width="16" height="16" rx="3" fill="url(#rayGrad)" transform="rotate(45 48 48)"/>

  <!-- ── Core Sun ── -->
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="30" fill="#0891b2" opacity="0.2"/>
  <!-- Main core -->
  <circle cx="100" cy="100" r="24" fill="url(#coreGrad)"/>
  <!-- Inner ring detail -->
  <circle cx="100" cy="100" r="17" fill="none" stroke="#0c1a30" stroke-width="2.5"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="8" fill="#0c1a30"/>
  <!-- Center highlight -->
  <circle cx="97"  cy="97"  r="3" fill="#67e8f9" opacity="0.6"/>
</svg>
